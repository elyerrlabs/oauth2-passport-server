name: ops-dev

services:

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    command: >
       redis-server
       --appendonly yes
       --appendfsync everysec
       --maxmemory 512mb
       --maxmemory-policy allkeys-lru
       --requirepass ${REDIS_PASSWORD}
    volumes:
       - redis-data:/data
    networks:
       - internal-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  db:
    image: postgres:17
    restart: always
    volumes:
      - pg-data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_DATABASE}"
    ports:
      - "5435:5432"
    networks:
      - public-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME}"]
      interval: 10s
      timeout: 10s
      retries: 10

  app:
    build:
      context: docker/development
      dockerfile: Dockerfile
      args:
        UID: ${UID}
        GID: ${GID}
    restart: always
    ports:
      - "8001:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/home/dev/code
      - ${SSH_DIR}:/www/dev/.ssh
      - ${GIT_CONFIG}:/home/dev/.gitconfig
    command: sh -c "/usr/local/bin/entrypoint.sh"
    tty: true
    stdin_open: true
    networks:
      - public-net
      - internal-net

volumes:
  pg-data:
  redis-data:

networks:
  internal-net:
    internal: true
  public-net:
    driver: bridge
